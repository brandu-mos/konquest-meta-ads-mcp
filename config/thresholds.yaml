# Meta Ads MCP - Safety Thresholds Configuration
#
# These thresholds control the safety tier classification system.
# Adjust per-account in accounts.yaml if specific accounts need different limits.

safety:
  # Budget increase thresholds (percentage)
  budget_increase_confirm_pct: 30       # Tier 1: mandatory confirmation above this
  budget_increase_preview_pct: 15       # Tier 2: dry-run preview between 15-30%

  # Bulk mutation threshold (object count)
  bulk_mutation_confirm_count: 5        # Tier 1: confirmation for bulk > this

  # High-spend logging threshold (EUR per day)
  high_spend_daily_threshold_eur: 100   # Extra logging for daily budgets above this

  # Rate limit thresholds (percentage of Meta's limit)
  rate_limit_warn_pct: 80              # Log warning at this level
  rate_limit_block_pct: 95             # Block operations at this level

optimization:
  # Learning phase tolerances
  learning_phase_max_days: 7
  learning_phase_cpa_tolerance: 2.0     # Allow 2x target CPA during learning
  post_learning_cpa_tolerance: 1.3      # Allow 1.3x target for first 14 days
  learning_phase_min_events: 50         # Min optimization events to exit learning

  # Fatigue detection
  fatigue_frequency_threshold: 3.5      # Flag ads with frequency above this
  fatigue_ctr_decline_pct: 20           # Flag if CTR drops more than 20%

  # Scaling rules
  max_budget_increase_step_pct: 30      # Never increase more than 30% at once
  preferred_budget_increase_step_pct: 20 # Default scaling increment

rollback:
  snapshot_retention_days: 30           # Keep rollback snapshots for 30 days
  mutation_log_retention_days: 90       # Keep mutation logs for 90 days
  debug_artifact_retention_days: 7      # Keep debug artifacts for 7 days
